name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore backend/Planilharias.Tests/Planilharias.Tests.csproj

      - name: Build
        run: dotnet build backend/Planilharias.Tests/Planilharias.Tests.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/Planilharias.Tests/Planilharias.Tests.csproj --configuration Release --no-build
